services:
  postgres:
    image: postgres:16-alpine
    container_name: trip-requests-postgres
    environment:
      POSTGRES_USER: trip_user
      POSTGRES_PASSWORD: trip_password
      POSTGRES_DB: trip_requests
    ports:
      - "5432:5432"
    volumes:
      - trip_requests_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trip_user -d trip_requests"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trip_requests_data:
